<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
  <title>Auth Test</title>
  <link rel="stylesheet" href="css/avtoriz.css">
  <style>
    body { font-family: sans-serif; padding: 10px; }
    pre { background:#111; color:#0f0; padding:10px; overflow:auto; }
    .row { margin: 8px 0; }
    button { margin-right: 6px; }
  </style>
  <script src="js/jquery.min.js"></script>
  <script src="cordova.js"></script>
  <script src="js/classes/Cookie.js"></script>
  <script src="js/classes/FileStorage.js"></script>
  <script src="js/classes/UserAuth.js"></script>
  <script src="js/init-auth.js"></script>
</head>
<body>
  <h2>Auth Test</h2>
  <div class="row">
    <button id="viewCookies">View Cookies</button>
    <button id="viewFile">View File</button>
    <button id="save">Save(login,hash)</button>
    <button id="clearFile">Clear File</button>
    <button id="clearCookies">Clear Cookies</button>
    <button id="resync">Resync From File</button>
  </div>
  <div class="row">
    <input id="login" placeholder="login" />
    <input id="hash" placeholder="hash" />
  </div>
  <pre id="out"></pre>

  <script src="js/test-auth.js"></script>

</html>
